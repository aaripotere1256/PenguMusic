<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PenguMusic">
<title>PenguMusic</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --card: #16161f;
    --card2: #1e1e2a;
    --border: rgba(255,255,255,0.06);
    --accent: #5b8cff;
    --accent2: #a78bfa;
    --accent-glow: rgba(91,140,255,0.25);
    --text: #f0f0f8;
    --text2: #8888aa;
    --text3: #55556a;
    --penguin: #4fc3f7;
    --danger: #ff6b8a;
    --success: #4ade80;
    --radius: 16px;
    --radius-sm: 10px;
    --player-h: 88px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* LAYOUT */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  /* BACKGROUND AMBIANCE */
  #bg-ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  #bg-ambient::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    top: -200px; left: -200px;
    background: radial-gradient(circle, rgba(91,140,255,0.08) 0%, transparent 70%);
    animation: drift1 20s ease-in-out infinite alternate;
  }
  #bg-ambient::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    bottom: -100px; right: -100px;
    background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%);
    animation: drift2 25s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(60px, 40px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-50px, -30px); } }

  /* HEADER */
  #header {
    position: relative;
    z-index: 10;
    padding: 52px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  #logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  #logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* SEARCH BAR */
  #search-wrap {
    position: relative;
    z-index: 10;
    padding: 0 20px 16px;
  }

  #search-container {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #search-container:focus-within {
    border-color: rgba(91,140,255,0.4);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #search-icon { color: var(--text3); font-size: 16px; flex-shrink: 0; }

  #search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    caret-color: var(--accent);
  }

  #search-input::placeholder { color: var(--text3); }

  #search-clear {
    display: none;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    border-radius: 50%;
    transition: color 0.15s;
  }
  #search-clear:hover { color: var(--text); }
  #search-clear.visible { display: block; }

  /* TABS */
  #tabs {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 8px;
    padding: 0 20px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 7px 16px;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  /* MAIN SCROLL AREA */
  #main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    z-index: 5;
    scrollbar-width: none;
    padding-bottom: calc(var(--player-h) + var(--safe-bottom) + 20px);
  }
  #main::-webkit-scrollbar { display: none; }

  /* SECTIONS */
  .section { padding: 0 20px 24px; }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* RESULTS GRID */
  #results-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 20px;
  }

  /* TRACK CARD */
  .track-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .track-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-glow), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .track-card:active { transform: scale(0.98); }
  .track-card:hover::before, .track-card.active::before { opacity: 1; }
  .track-card.active { border-color: rgba(91,140,255,0.35); }

  .track-thumb {
    position: relative;
    width: 52px; height: 52px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg3);
  }

  .track-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .track-thumb .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 18px;
  }

  .track-card.active .play-overlay,
  .track-card:hover .play-overlay { opacity: 1; }

  .track-info { flex: 1; min-width: 0; }

  .track-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .track-card.active .track-title { color: var(--accent); }

  .track-sub {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-duration {
    font-size: 12px;
    color: var(--text3);
    flex-shrink: 0;
  }

  .track-playing-anim {
    display: none;
    gap: 2px;
    align-items: flex-end;
    height: 16px;
    flex-shrink: 0;
  }

  .track-card.active .track-playing-anim { display: flex; }
  .track-card.active .track-duration { display: none; }

  .bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: sound-bar 0.8s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 12px; animation-delay: 0.2s; }
  .bar:nth-child(3) { height: 8px; animation-delay: 0.4s; }

  @keyframes sound-bar {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1); }
  }

  /* EMPTY STATE */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    text-align: center;
    gap: 16px;
  }

  #empty-state .penguin-emoji { font-size: 64px; animation: float 3s ease-in-out infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  #empty-state h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  #empty-state p { font-size: 14px; color: var(--text3); line-height: 1.6; }

  /* LOADING */
  #loading-state {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 60px 20px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #loading-state p { color: var(--text2); font-size: 14px; }

  /* PLAYER */
  #player {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 16px calc(var(--safe-bottom) + 12px);
    pointer-events: none;
  }

  #player-inner {
    background: rgba(22, 22, 31, 0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 12px 14px;
    pointer-events: all;
    box-shadow: 0 -4px 40px rgba(0,0,0,0.5), 0 0 0 0 var(--accent-glow);
    transition: box-shadow 0.3s;
  }

  #player-inner.playing {
    box-shadow: 0 -4px 40px rgba(0,0,0,0.5), 0 0 30px var(--accent-glow);
  }

  #player-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  #player-thumb {
    width: 44px; height: 44px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg3);
    position: relative;
  }

  #player-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  #player-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    color: var(--text3);
  }

  #player-info { flex: 1; min-width: 0; }

  #player-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  #player-channel {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #player-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: color 0.15s, background 0.15s;
  }

  .ctrl-btn:hover { color: var(--text); background: var(--bg3); }

  #btn-play-pause {
    background: var(--accent);
    color: white;
    width: 40px; height: 40px;
    font-size: 18px;
    box-shadow: 0 4px 16px var(--accent-glow);
    transition: transform 0.1s, box-shadow 0.15s;
  }

  #btn-play-pause:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 24px var(--accent-glow);
  }

  #btn-play-pause:active { transform: scale(0.95); }

  /* PROGRESS */
  #progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #progress-time-cur, #progress-time-dur {
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
    width: 28px;
  }
  #progress-time-dur { text-align: right; }

  #progress-bar-wrap {
    flex: 1;
    height: 20px;
    display: flex; align-items: center;
    cursor: pointer;
  }

  #progress-bar-bg {
    width: 100%;
    height: 3px;
    background: var(--bg3);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    width: 0%;
    transition: width 0.5s linear;
  }

  /* NO TRACK STATE */
  #player-empty {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0.5;
  }

  #player-empty-icon { font-size: 24px; }
  #player-empty-text { font-size: 13px; color: var(--text2); }

  /* YT IFRAME (hidden) */
  #yt-container {
    position: fixed;
    width: 1px; height: 1px;
    top: -9999px; left: -9999px;
    opacity: 0;
    pointer-events: none;
  }

  /* TOAST */
  #toast {
    position: fixed;
    top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
    pointer-events: none;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* INSTALL BANNER */
  #install-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 300;
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 13px;
    font-weight: 500;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  #install-banner.visible { display: flex; }

  #btn-install {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  #btn-dismiss-install {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* HISTORY SECTION */
  .history-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 7px 14px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    margin: 0 4px 8px 0;
  }

  .history-chip:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .history-chip span { font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <div id="bg-ambient"></div>

  <!-- Install banner -->
  <div id="install-banner">
    <span>📲 Installer PenguMusic sur ton écran d'accueil</span>
    <button id="btn-install">Installer</button>
    <button id="btn-dismiss-install">✕</button>
  </div>

  <!-- Header -->
  <div id="header">
    <div id="logo">
      <div id="logo-icon">🐧</div>
      <span id="logo-text">PenguMusic</span>
    </div>
  </div>

  <!-- Search -->
  <div id="search-wrap">
    <div id="search-container">
      <span id="search-icon">🔍</span>
      <input id="search-input" type="search" placeholder="Artiste, titre, album..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="search-clear">✕</button>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab-btn active" data-filter="all">Tout</button>
    <button class="tab-btn" data-filter="music">Musique</button>
    <button class="tab-btn" data-filter="clip">Clips</button>
    <button class="tab-btn" data-filter="live">Live</button>
    <button class="tab-btn" data-filter="cover">Covers</button>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Empty state -->
    <div id="empty-state">
      <div class="penguin-emoji">🐧</div>
      <h2>Qu'est-ce qu'on écoute ?</h2>
      <p>Recherche un artiste, un titre ou une ambiance pour commencer.</p>
    </div>

    <!-- Loading -->
    <div id="loading-state">
      <div class="spinner"></div>
      <p>Recherche en cours...</p>
    </div>

    <!-- History -->
    <div id="history-section" class="section" style="display:none">
      <div class="section-title">Recherches récentes</div>
      <div id="history-chips"></div>
    </div>

    <!-- Results -->
    <div id="results-grid"></div>
  </div>

  <!-- Player -->
  <div id="player">
    <div id="player-inner">
      <div id="player-empty">
        <span id="player-empty-icon">🎵</span>
        <span id="player-empty-text">Lance une musique pour commencer</span>
      </div>
      <div id="player-full" style="display:none">
        <div id="player-top">
          <div id="player-thumb">
            <div id="player-thumb-placeholder">🎵</div>
            <img id="player-thumb-img" src="" alt="" style="display:none">
          </div>
          <div id="player-info">
            <div id="player-title">—</div>
            <div id="player-channel">—</div>
          </div>
          <div id="player-controls">
            <button class="ctrl-btn" id="btn-prev">⏮</button>
            <button class="ctrl-btn" id="btn-play-pause">▶</button>
            <button class="ctrl-btn" id="btn-next">⏭</button>
          </div>
        </div>
        <div id="progress-wrap">
          <span id="progress-time-cur">0:00</span>
          <div id="progress-bar-wrap" id="progress-bar-wrap">
            <div id="progress-bar-bg">
              <div id="progress-bar-fill"></div>
            </div>
          </div>
          <span id="progress-time-dur">0:00</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- YouTube iframe (hidden) -->
<div id="yt-container">
  <div id="yt-player"></div>
</div>

<div id="toast"></div>

<script>
// ==================== CONFIG ====================
const YT_API_KEY = 'AIzaSyAYeYjjNahTUfuRd1-FZMxHfsImH9fVdf4';
const INVIDIOUS_INSTANCES = [
  'https://invidious.poast.org',
  'https://inv.nadeko.net',
  'https://invidious.privacydev.net'
];

// ==================== STATE ====================
let ytPlayer = null;
let ytReady = false;
let currentTrack = null;
let currentIndex = -1;
let tracks = [];
let isPlaying = false;
let progressInterval = null;
let searchTimeout = null;
let currentFilter = 'all';
let searchHistory = JSON.parse(localStorage.getItem('pm_history') || '[]');
let deferredPrompt = null;

// ==================== YT API ====================
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  ytPlayer = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: {
      autoplay: 0,
      controls: 0,
      disablekb: 1,
      fs: 0,
      iv_load_policy: 3,
      modestbranding: 1,
      rel: 0,
      showinfo: 0,
      origin: window.location.origin
    },
    events: {
      onReady: () => {},
      onStateChange: onPlayerStateChange,
      onError: onPlayerError
    }
  });
};

function onPlayerStateChange(e) {
  const S = YT.PlayerState;
  if (e.data === S.PLAYING) {
    isPlaying = true;
    updatePlayBtn();
    startProgress();
    document.getElementById('player-inner').classList.add('playing');
  } else if (e.data === S.PAUSED || e.data === S.ENDED) {
    isPlaying = false;
    updatePlayBtn();
    stopProgress();
    document.getElementById('player-inner').classList.remove('playing');
    if (e.data === S.ENDED) playNext();
  }
}

function onPlayerError(e) {
  // Fallback to Invidious on error
  if (currentTrack) {
    showToast('YouTube indispo, tentative alternative...');
    playViaInvidious(currentTrack.id);
  }
}

async function playViaInvidious(videoId) {
  for (const inst of INVIDIOUS_INSTANCES) {
    try {
      const res = await fetch(`${inst}/api/v1/videos/${videoId}?fields=adaptiveFormats`, { signal: AbortSignal.timeout(4000) });
      if (!res.ok) continue;
      const data = await res.json();
      const audioFormats = data.adaptiveFormats?.filter(f => f.type?.startsWith('audio/')) || [];
      if (audioFormats.length === 0) continue;
      audioFormats.sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
      const url = audioFormats[0].url;
      // Use audio element as fallback
      playAudioFallback(url);
      return;
    } catch {}
  }
  showToast('Impossible de lire ce titre 😢');
}

let audioFallback = null;
function playAudioFallback(url) {
  if (audioFallback) { audioFallback.pause(); audioFallback = null; }
  audioFallback = new Audio(url);
  audioFallback.play().catch(() => showToast('Erreur de lecture'));
  audioFallback.onended = playNext;
  isPlaying = true;
  updatePlayBtn();
}

// ==================== SEARCH ====================
async function search(query, filter) {
  if (!query.trim()) return;

  showLoading(true);
  hideEmpty();

  let q = query.trim();
  if (filter === 'music') q += ' audio officiel';
  else if (filter === 'clip') q += ' clip officiel';
  else if (filter === 'live') q += ' live concert';
  else if (filter === 'cover') q += ' cover';

  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&q=${encodeURIComponent(q)}&maxResults=20&key=${YT_API_KEY}&safeSearch=none`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
      showLoading(false);
      showEmpty('Aucun résultat', `Essaie avec d'autres mots-clés.`);
      return;
    }

    // Get durations
    const ids = data.items.map(i => i.id.videoId).join(',');
    const detailsUrl = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${ids}&key=${YT_API_KEY}`;
    const detailsRes = await fetch(detailsUrl);
    const detailsData = await detailsRes.json();
    const detailsMap = {};
    (detailsData.items || []).forEach(i => { detailsMap[i.id] = i; });

    tracks = data.items.map(item => {
      const vid = item.id.videoId;
      const details = detailsMap[vid];
      const duration = details ? parseDuration(details.contentDetails.duration) : null;
      return {
        id: vid,
        title: item.snippet.title,
        channel: item.snippet.channelTitle,
        thumb: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
        duration
      };
    });

    renderTracks();
    saveHistory(query.trim());
    showLoading(false);
  } catch (err) {
    showLoading(false);
    showEmpty('Erreur de recherche', 'Vérifie ta connexion et réessaie.');
    console.error(err);
  }
}

function parseDuration(iso) {
  if (!iso) return null;
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return null;
  const h = parseInt(m[1] || 0);
  const min = parseInt(m[2] || 0);
  const s = parseInt(m[3] || 0);
  const total = h * 3600 + min * 60 + s;
  return total;
}

function formatTime(secs) {
  if (!secs && secs !== 0) return '—';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ==================== RENDER ====================
function renderTracks() {
  const grid = document.getElementById('results-grid');
  grid.innerHTML = '';

  tracks.forEach((track, i) => {
    const card = document.createElement('div');
    card.className = 'track-card' + (currentTrack?.id === track.id ? ' active' : '');
    card.dataset.index = i;

    card.innerHTML = `
      <div class="track-thumb">
        ${track.thumb ? `<img src="${track.thumb}" alt="" loading="lazy">` : '<span style="display:flex;align-items:center;justify-content:center;height:100%;font-size:24px">🎵</span>'}
        <div class="play-overlay">${currentTrack?.id === track.id && isPlaying ? '⏸' : '▶'}</div>
      </div>
      <div class="track-info">
        <div class="track-title">${escHtml(track.title)}</div>
        <div class="track-sub">${escHtml(track.channel)}</div>
      </div>
      <div class="track-playing-anim">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <div class="track-duration">${track.duration ? formatTime(track.duration) : ''}</div>
    `;

    card.addEventListener('click', () => playTrack(i));
    grid.appendChild(card);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== PLAYBACK ====================
function playTrack(index) {
  if (!ytReady) {
    showToast('Lecteur en cours de chargement...');
    setTimeout(() => playTrack(index), 1000);
    return;
  }

  currentIndex = index;
  currentTrack = tracks[index];

  // Update card states
  document.querySelectorAll('.track-card').forEach((c, i) => {
    c.classList.toggle('active', i === index);
    const overlay = c.querySelector('.play-overlay');
    if (overlay) overlay.textContent = i === index ? '⏸' : '▶';
  });

  // Update player UI
  document.getElementById('player-empty').style.display = 'none';
  document.getElementById('player-full').style.display = 'block';
  document.getElementById('player-title').textContent = currentTrack.title;
  document.getElementById('player-channel').textContent = currentTrack.channel;

  const img = document.getElementById('player-thumb-img');
  const placeholder = document.getElementById('player-thumb-placeholder');
  if (currentTrack.thumb) {
    img.src = currentTrack.thumb;
    img.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
  }

  // Set document title
  document.title = `${currentTrack.title} — PenguMusic`;

  // Load and play
  ytPlayer.loadVideoById({
    videoId: currentTrack.id,
    startSeconds: 0
  });
}

function togglePlayPause() {
  if (!currentTrack) return;
  if (isPlaying) {
    ytPlayer.pauseVideo();
  } else {
    ytPlayer.playVideo();
  }
}

function playNext() {
  if (tracks.length === 0) return;
  const next = (currentIndex + 1) % tracks.length;
  playTrack(next);
}

function playPrev() {
  if (tracks.length === 0) return;
  const prev = (currentIndex - 1 + tracks.length) % tracks.length;
  playTrack(prev);
}

function updatePlayBtn() {
  const btn = document.getElementById('btn-play-pause');
  btn.textContent = isPlaying ? '⏸' : '▶';

  // Update active card overlay
  document.querySelectorAll('.track-card.active .play-overlay').forEach(el => {
    el.textContent = isPlaying ? '⏸' : '▶';
  });
}

// ==================== PROGRESS ====================
function startProgress() {
  stopProgress();
  progressInterval = setInterval(updateProgress, 500);
}

function stopProgress() {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
}

function updateProgress() {
  if (!ytPlayer || !ytPlayer.getCurrentTime) return;
  try {
    const cur = ytPlayer.getCurrentTime();
    const dur = ytPlayer.getDuration();
    if (!dur) return;
    const pct = (cur / dur) * 100;
    document.getElementById('progress-bar-fill').style.width = pct + '%';
    document.getElementById('progress-time-cur').textContent = formatTime(cur);
    document.getElementById('progress-time-dur').textContent = formatTime(dur);
  } catch {}
}

document.getElementById('progress-bar-wrap').addEventListener('click', function(e) {
  if (!ytPlayer || !currentTrack) return;
  const rect = this.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const dur = ytPlayer.getDuration();
  if (dur) ytPlayer.seekTo(pct * dur, true);
});

// ==================== UI HELPERS ====================
function showLoading(show) {
  document.getElementById('loading-state').style.display = show ? 'flex' : 'none';
  document.getElementById('results-grid').style.display = show ? 'none' : 'flex';
  document.getElementById('history-section').style.display = 'none';
  if (show) hideEmpty();
}

function hideEmpty() {
  document.getElementById('empty-state').style.display = 'none';
}

function showEmpty(title, msg) {
  const el = document.getElementById('empty-state');
  el.style.display = 'flex';
  el.querySelector('h2').textContent = title;
  el.querySelector('p').textContent = msg;
  document.getElementById('results-grid').innerHTML = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== HISTORY ====================
function saveHistory(query) {
  searchHistory = [query, ...searchHistory.filter(h => h !== query)].slice(0, 8);
  localStorage.setItem('pm_history', JSON.stringify(searchHistory));
}

function renderHistory() {
  if (searchHistory.length === 0) return;
  const section = document.getElementById('history-section');
  const chips = document.getElementById('history-chips');
  section.style.display = 'block';
  chips.innerHTML = '';
  searchHistory.forEach(q => {
    const chip = document.createElement('div');
    chip.className = 'history-chip';
    chip.innerHTML = `<span>🕐</span>${escHtml(q)}`;
    chip.addEventListener('click', () => {
      document.getElementById('search-input').value = q;
      triggerSearch(q);
    });
    chips.appendChild(chip);
  });
}

// ==================== SEARCH EVENTS ====================
function triggerSearch(query) {
  document.getElementById('search-clear').classList.toggle('visible', query.length > 0);
  if (!query.trim()) {
    document.getElementById('results-grid').innerHTML = '';
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('empty-state').querySelector('h2').textContent = "Qu'est-ce qu'on écoute ?";
    document.getElementById('empty-state').querySelector('p').textContent = "Recherche un artiste, un titre ou une ambiance pour commencer.";
    renderHistory();
    return;
  }
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => search(query, currentFilter), 500);
}

document.getElementById('search-input').addEventListener('input', e => triggerSearch(e.target.value));

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimeout);
    search(e.target.value, currentFilter);
  }
});

document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  triggerSearch('');
  document.getElementById('search-input').focus();
});

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    const q = document.getElementById('search-input').value;
    if (q.trim()) search(q, currentFilter);
  });
});

// Player controls
document.getElementById('btn-play-pause').addEventListener('click', togglePlayPause);
document.getElementById('btn-next').addEventListener('click', playNext);
document.getElementById('btn-prev').addEventListener('click', playPrev);

// ==================== PWA INSTALL ====================
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('visible');
});

document.getElementById('btn-install').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') showToast('PenguMusic installé ! 🐧');
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('visible');
});

document.getElementById('btn-dismiss-install').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('visible');
});

// ==================== SERVICE WORKER ====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ==================== LOAD YT API ====================
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

// ==================== INIT ====================
document.getElementById('results-grid').style.flexDirection = 'column';
document.getElementById('results-grid').style.gap = '8px';
document.getElementById('results-grid').style.padding = '0 20px';

// Show history on load
renderHistory();
if (searchHistory.length > 0) {
  document.getElementById('empty-state').style.display = 'flex';
  renderHistory();
}
</script>
